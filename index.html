<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALL-1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 防止背景动画溢出 */
            background-color: #f8fafc;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: pulse-slow 10s infinite ease-in-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .text-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hover-lift {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .hover-lift:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

    <!-- 动态背景装饰物 -->
    <div class="blob w-[500px] h-[500px] bg-blue-100 top-[-10%] left-[-10%]" style="animation-delay: 0s;"></div>
    <div class="blob w-[400px] h-[400px] bg-purple-100 bottom-[-5%] right-[5%]" style="animation-delay: -2s;"></div>
    <div class="blob w-[300px] h-[300px] bg-pink-100 top-[20%] right-[-5%]" style="animation-delay: -4s;"></div>
    <div class="blob w-[350px] h-[350px] bg-yellow-50 bottom-[10%] left-[10%]" style="animation-delay: -6s;"></div>

    <nav class="fixed top-0 w-full p-8 flex justify-between items-center z-10">
        <div class="text-xl font-extrabold tracking-tighter text-slate-800">
            MINIMAL<span class="text-blue-500">.</span>
        </div>
        <div class="space-x-8 text-sm font-medium text-slate-500">
            <a href="#" class="hover:text-slate-900 transition-colors">作品</a>
            <a href="#" class="hover:text-slate-900 transition-colors">关于</a>
            <a href="#" class="px-5 py-2 bg-slate-900 text-white rounded-full hover:bg-slate-800 transition-all shadow-lg">联系我</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 z-10">
        <div class="max-w-4xl mx-auto text-center">
            <!-- 玻璃拟态容器 -->
            <div class="glass-card p-12 md:p-20 rounded-[40px] hover-lift">
                <span class="inline-block py-1 px-3 bg-white/60 rounded-full text-xs font-bold text-blue-600 uppercase tracking-widest mb-6">
                    Welcome to the future
                </span>
                
                <h1 class="text-5xl md:text-8xl font-extrabold mb-8 tracking-tight leading-tight">
                    <span class="text-gradient">创造属于你的</span><br/>
                    <span class="relative">
                        数字美学
                        <svg class="absolute -bottom-2 left-0 w-full h-3 text-blue-200" viewBox="0 0 100 10" preserveAspectRatio="none">
                            <path d="M0 5 Q 25 0 50 5 T 100 5" stroke="currentColor" stroke-width="4" fill="transparent" />
                        </svg>
                    </span>
                </h1>

                <p class="text-lg md:text-xl text-slate-500 mb-10 max-w-2xl mx-auto leading-relaxed">
                    在极简中发现无限可能。我们致力于通过纯粹的设计语言，
                    为每一个灵感打造最动人的表达。
                </p>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button class="w-full sm:w-auto px-8 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:shadow-2xl hover:scale-105 transition-all">
                        立即开始
                    </button>
                    <button class="w-full sm:w-auto px-8 py-4 bg-white text-slate-700 rounded-2xl font-bold border border-slate-200 hover:bg-slate-50 transition-all">
                        查看演示
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-8 w-full text-center text-slate-400 text-sm">
        <p>© 2024 Minimal Aesthetics. Designed with ✨</p>
    </div>

    <script>
        /* 增加鼠标跟随视差效果 */
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                const offsetX = (x - 0.5) * speed;
                const offsetY = (y - 0.5) * speed;
                blob.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });

        /* 简单的入场动画效果 */
        window.onload = () => {
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(20px)';
            mainContent.style.transition = 'all 1s ease-out';
            
            setTimeout(() => {
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        };
    </script>
</body>
</html>
